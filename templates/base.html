<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}Dominando Python{% endblock %}</title>
  <meta name="description" content="{% block meta_descricao %}Aprenda Python com projetos reais{% endblock %}">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "partials/navbar.html" %}

  {% if messages %}
    <div class="messages">
      {% for msg in messages %}
        <div class="message message--{{ msg.tags }}">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main>{% block conteudo %}{% endblock %}</main>

  {% include "partials/footer.html" %}
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
