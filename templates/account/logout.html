{% extends "base.html" %}
{% block titulo %}Sair{% endblock %}
{% block conteudo %}
<div class="container container--narrow page auth-page">
  <div class="auth-card-simple auth-card-simple--center">
    <h1>Sair da conta?</h1>
    <p class="auth-sub">Tem certeza que deseja encerrar sua sessão?</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn--primary btn--lg btn--block">Confirmar saída</button>
    </form>
    <p class="auth-footer">
      <a href="{% url 'core:home' %}">Cancelar e voltar</a>
    </p>
  </div>
</div>
{% endblock %}
